<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>칩 브리핑 · 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf8f2;
    --paper-2: #efede5;
    --ink: #151515;
    --muted: #66645e;
    --soft: #d8d3c5;
    --accent: #0f766e;
    --accent-2: #b45309;
    --serif: "Noto Serif KR", Georgia, serif;
    --sans: "Noto Sans KR", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); line-height: 1.62; }
  .topbar { border-bottom: 1px solid var(--soft); font-family: var(--mono); font-size: 11px; letter-spacing: .12em; color: var(--muted); }
  .topbar-inner { max-width: 1080px; margin: 0 auto; padding: 10px 20px; display: flex; justify-content: space-between; gap: 16px; text-transform: uppercase; }
  .topbar a { color: var(--accent); text-decoration: none; }
  .masthead { max-width: 1080px; margin: 0 auto; padding: 44px 20px 26px; text-align: center; border-bottom: 3px double var(--ink); }
  h1 { margin: 0; font-family: var(--serif); font-size: clamp(2.6rem, 8vw, 5.4rem); line-height: .9; font-weight: 900; }
  .tagline { margin-top: 14px; font-family: var(--serif); color: var(--muted); }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 20px 64px; display: grid; grid-template-columns: 300px minmax(0, 1fr); gap: 34px; }
  @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }
  .dates { border-right: 1px solid var(--soft); padding-right: 22px; }
  @media (max-width: 820px) { .dates { border-right: 0; padding-right: 0; } }
  .date-btn { display: block; width: 100%; margin: 0 0 8px; padding: 12px 10px; border: 1px solid var(--soft); background: transparent; text-align: left; cursor: pointer; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .date-btn.active, .date-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .section-label { display: flex; align-items: center; gap: 12px; margin: 0 0 18px; color: var(--accent); font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
  .section-label::after { content: ""; height: 1px; flex: 1; background: var(--soft); }
  .entry { padding: 18px 0; border-bottom: 1px solid var(--soft); cursor: pointer; }
  .entry:hover { background: var(--paper-2); }
  .entry h2, .entry h3 { margin: 7px 0; font-family: var(--serif); line-height: 1.25; }
  .entry h2 { font-size: clamp(1.45rem, 3vw, 2.1rem); }
  .entry h3 { font-size: 1.15rem; }
  .meta { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .12em; color: var(--accent); text-transform: uppercase; }
  .sector { color: var(--accent-2); }
  p { margin: 0; color: var(--muted); }
  .source { display: inline-flex; margin-top: 10px; color: var(--accent); font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; text-decoration: none; }
  .source:hover { color: var(--ink); text-decoration: underline; }
  .empty { padding: 40px 0; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: .1em; }
  .summary-box { margin: 0 0 24px; padding: 18px 20px; background: #171717; color: var(--paper); border-top: 4px solid var(--accent); }
  .summary-box h2 { margin: 0 0 8px; font-family: var(--mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #f7d08a; }
  .summary-box p { color: var(--paper); margin: 0 0 8px; font-family: var(--serif); }
  .reader { position: fixed; inset: 0; display: none; align-items: flex-start; justify-content: center; padding: 38px 18px; overflow-y: auto; background: rgba(16, 16, 16, .56); z-index: 10; }
  .reader.open { display: flex; }
  .reader-panel { width: min(760px, 100%); background: var(--paper); border: 1px solid var(--soft); padding: 50px clamp(24px, 6vw, 58px) 58px; position: relative; box-shadow: 0 28px 80px rgba(0, 0, 0, .28); }
  .close { position: absolute; top: 14px; right: 18px; border: 0; background: transparent; font-family: var(--serif); font-size: 30px; cursor: pointer; }
  .reader h2 { margin: 12px 0 18px; font-family: var(--serif); font-size: clamp(1.7rem, 4vw, 2.5rem); line-height: 1.2; }
  .reader-body { border-top: 1px solid var(--soft); padding-top: 22px; font-family: var(--serif); font-size: 1.08rem; white-space: pre-line; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a href="index.html">← TODAY</a>
      <span id="updated">ARCHIVE</span>
    </div>
  </div>
  <header class="masthead">
    <h1>아카이브</h1>
    <div class="tagline">날짜별 칩 브리핑 기록.</div>
  </header>
  <main class="wrap">
    <aside class="dates" id="dates"></aside>
    <section>
      <div class="section-label" id="day-title">Briefing</div>
      <div id="content"></div>
    </section>
  </main>
  <div class="reader" id="reader" role="dialog" aria-modal="true">
    <article class="reader-panel">
      <button class="close" id="close" aria-label="닫기">×</button>
      <div class="meta" id="reader-meta"></div>
      <h2 id="reader-title"></h2>
      <div class="meta" id="reader-date"></div>
      <div id="reader-source"></div>
      <div class="reader-body" id="reader-body"></div>
    </article>
  </div>
<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const fmt = (iso) => {
    try { return new Date(iso).toLocaleString("ko-KR", { month: "long", day: "numeric", hour: "2-digit", minute: "2-digit" }); }
    catch { return iso || ""; }
  };
  const excerpt = (s, n = 260) => {
    const clean = String(s || "").replace(/\s+/g, " ").trim();
    return clean.length > n ? clean.slice(0, n).trim() + "..." : clean;
  };
  const para = (s) => String(s || "").split(/\n{2,}|\n/).filter(Boolean)
    .map((p) => `<p>${esc(p)}</p>`).join("");
  function sourceLink(a) {
    if (!a.source_url) return "";
    return `<a class="source" href="${esc(a.source_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">근거 출처 · ${esc(a.source_name || "source")}</a>`;
  }
  async function loadJson(path) {
    const res = await fetch(path + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }
  let index;
  try {
    index = await loadJson("archive/index.json");
  } catch {
    $("dates").innerHTML = `<div class="empty">아직 저장된 아카이브가 없습니다.</div>`;
    $("content").innerHTML = `<div class="empty">일일 업데이트가 한 번 실행되면 여기에 쌓입니다.</div>`;
    return;
  }
  const items = index.items || [];
  let active = items[0] && items[0].date;
  let byId = {};
  async function renderDates() {
    $("dates").innerHTML = items.map((item) => `
      <button class="date-btn ${item.date === active ? "active" : ""}" data-date="${esc(item.date)}">
        ${esc(item.date)}<br>
        ${esc(item.article_count)} NEWS
      </button>
    `).join("");
    document.querySelectorAll(".date-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        active = btn.dataset.date;
        await render();
      });
    });
  }
  async function render() {
    await renderDates();
    const item = items.find((x) => x.date === active);
    if (!item) return;
    const data = await loadJson(item.file);
    $("updated").textContent = "GENERATED " + fmt(data.generated_at);
    $("day-title").textContent = item.date;
    const articles = data.articles || [];
    byId = Object.fromEntries(articles.map((a) => [a.id, a]));
    const summaryBlocks = [
      data.daily_summary ? `<article class="summary-box"><h2>Daily Summary</h2>${para(data.daily_summary)}</article>` : "",
      data.community_sentiment ? `<article class="summary-box"><h2>Community Sentiment</h2>${para(data.community_sentiment)}</article>` : ""
    ].join("");
    $("content").innerHTML = summaryBlocks + (articles.map((a, i) => `
      <article class="entry" data-id="${esc(a.id)}">
        <div class="meta"><span class="sector">${esc(a.sector)}</span> · ${esc((a.category || "news").toUpperCase())}</div>
        ${i === 0 ? `<h2>${esc(a.headline)}</h2>` : `<h3>${esc(a.headline)}</h3>`}
        <p>${esc(excerpt(a.body))}</p>
        ${sourceLink(a)}
      </article>    `).join("") || `<div class="empty">해당 날짜의 기사가 없습니다.</div>`);
    document.querySelectorAll("[data-id]").forEach((el) => {
      el.addEventListener("click", () => openReader(el.dataset.id));
    });
  }
  function openReader(id) {
    const a = byId[id];
    if (!a) return;
    $("reader-meta").innerHTML = `<span class="sector">${esc(a.sector)}</span> · ${esc((a.category || "news").toUpperCase())}`;
    $("reader-title").textContent = a.headline || "";
    $("reader-date").textContent = fmt(a.created_at);
    $("reader-source").innerHTML = sourceLink(a);
    $("reader-body").innerHTML = para(a.body);
    $("reader").classList.add("open");
    document.body.style.overflow = "hidden";
  }
  $("close").addEventListener("click", () => {
    $("reader").classList.remove("open");
    document.body.style.overflow = "";
  });
  $("reader").addEventListener("click", (e) => {
    if (e.target.id === "reader") $("close").click();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") $("close").click();
  });
  await render();
})();
</script>
</body>
</html>
